# cdn-gate Worker config.
#
# Bucket name and KV namespace id are NOT in the repo — CI substitutes
# them at deploy time from GitHub secrets so a wrong-account checkout can
# never accidentally publish to production. See .github/workflows/
# deploy-cdn-gate.yml and workers/README.md.
#
# Three environments, each picked via `wrangler deploy --env <name>`:
#   (default — no --env): no routes; the worker exists in the account
#     but receives zero traffic. The "upload-only" CI step uses this so
#     we can validate the deploy machinery before any real request is
#     ever served by it.
#   canary:     one tenant slug only (CANARY_SLUG, substituted by CI).
#               Use this for the 24hr observation window before flipping
#               the catch-all.
#   production: catch-all route on cdn.myhotelops.com/*. The state where
#               every tenant's media flows through the worker. Don't
#               deploy here until canary has been clean for ~24hr and a
#               health alert is wired up.
#
# Bindings (R2 + KV) are repeated under each env block because wrangler
# does not inherit bindings into named environments by default.

name = "hotelops-cdn-gate"
main = "index.ts"
compatibility_date = "2026-01-15"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "REPLACE_WITH_R2_BUCKET_NAME"

[[kv_namespaces]]
binding = "GATE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# ─── canary ────────────────────────────────────────────────────────────
[env.canary]
routes = [
  { pattern = "cdn.myhotelops.com/CANARY_SLUG/*", zone_name = "myhotelops.com" },
]

[[env.canary.r2_buckets]]
binding = "MEDIA"
bucket_name = "REPLACE_WITH_R2_BUCKET_NAME"

[[env.canary.kv_namespaces]]
binding = "GATE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# ─── production ────────────────────────────────────────────────────────
[env.production]
routes = [
  { pattern = "cdn.myhotelops.com/*", zone_name = "myhotelops.com" },
]

[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "REPLACE_WITH_R2_BUCKET_NAME"

[[env.production.kv_namespaces]]
binding = "GATE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
