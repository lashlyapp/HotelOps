name: R2 CORS

# Applies the Cloudflare R2 bucket CORS policy from infra/r2-cors.json so the
# browser can PUT directly to R2 from the app's origins. Runs automatically
# whenever the policy file (or this workflow) changes on a tracked branch, and
# is also available via manual dispatch.
#
# Required repo secrets (one-time setup):
#   CLOUDFLARE_API_TOKEN  — token with "Workers R2 Storage:Edit" on the
#                           account that owns the bucket
#   CLOUDFLARE_ACCOUNT_ID — account that owns the app-hotelops bucket

on:
  push:
    paths:
      - infra/r2-cors.json
      - .github/workflows/r2-cors.yml
  workflow_dispatch:
    inputs:
      bucket:
        description: R2 bucket name
        required: true
        default: app-hotelops

concurrency:
  # Serialize CORS updates against the shared bucket so concurrent pushes can't
  # race each other.
  group: r2-cors
  cancel-in-progress: false

jobs:
  apply:
    name: Apply CORS policy
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: jq empty infra/r2-cors.json

      - name: PUT CORS policy to Cloudflare R2
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BUCKET: ${{ inputs.bucket || 'app-hotelops' }}
        run: |
          set -euo pipefail
          response=$(mktemp)
          status=$(curl --silent --show-error \
            --request PUT \
            --output "$response" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $CF_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data @infra/r2-cors.json \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/r2/buckets/$BUCKET/cors")
          echo "HTTP $status"
          cat "$response"
          echo
          if [ "$status" != "200" ]; then
            exit 1
          fi
          jq -e '.success == true' "$response" > /dev/null
