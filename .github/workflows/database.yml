name: Database

# Runs on every push (feature branches AND the push that lands on main when a PR
# merges) and via manual dispatch. Idempotent: Supabase CLI tracks applied
# migrations in supabase_migrations.schema_migrations, and the seed script
# upserts org/properties + tolerates already-invited users.

on:
  push:
  workflow_dispatch:

concurrency:
  # Serialize runs against the shared remote DB so two concurrent pushes can't
  # race each other applying migrations or seeding.
  group: database
  cancel-in-progress: false

jobs:
  apply:
    name: Migrate + seed
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --include-all

      - name: Install dependencies
        run: npm ci

      - name: Seed CG Hotel Group + invite owner
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.SITE_URL }}
          SEED_OWNER_EMAIL: ${{ secrets.SEED_OWNER_EMAIL }}
        run: npm run setup
