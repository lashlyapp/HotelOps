name: Database

# Applies Supabase migrations to the linked remote project on every push
# (feature branches AND the push that lands on main when a PR merges) and via
# manual dispatch. Idempotent: Supabase CLI tracks applied migrations in
# supabase_migrations.schema_migrations.
#
# Tenant onboarding (creating an org, its properties, and inviting the owner)
# is intentionally NOT part of this workflow — that's a manual,
# per-customer operation. See .github/workflows/onboard-tenant.yml.

on:
  push:
  workflow_dispatch:

concurrency:
  # Serialize migration runs against the shared remote DB so concurrent pushes
  # can't race each other.
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --include-all
