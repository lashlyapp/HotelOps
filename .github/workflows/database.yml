name: Database

# Applies Supabase migrations to the linked remote project.
#
# **Manual-only by design.** Migrations are not auto-applied on push —
# operators run this workflow_dispatch after reviewing the merged PR and
# deciding the production DB is ready. This prevents a typo'd migration on
# a feature branch from accidentally hitting prod, and keeps every schema
# change as a deliberate operator action.
#
# Idempotent: Supabase CLI tracks applied migrations in
# supabase_migrations.schema_migrations, so re-runs are no-ops on
# already-applied files.
#
# Tenant onboarding (creating an org, its properties, and inviting the owner)
# is intentionally NOT part of this workflow — that's a per-customer
# operation, done from the admin portal at /admin → "New tenant".

on:
  workflow_dispatch:

concurrency:
  # Serialize migration runs against the shared remote DB so concurrent pushes
  # can't race each other.
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --include-all
