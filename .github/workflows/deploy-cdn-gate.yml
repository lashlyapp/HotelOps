# Deploy the cdn-gate Worker.
#
# Triggers:
#   - push to main touching the Worker, its deploy workflow, the KV-sync
#     script, or the app-side gate helpers → auto-deploys target=production
#     and then runs the KV backfill. Pair with a required reviewer on the
#     `cdn-gate-production` GitHub Environment if you want an approval gate.
#   - workflow_dispatch → choose any target (canary, upload-only, sync-only,
#     rollback-*).
#
# Targets:
#   1. upload-only            → validates build + bindings, no traffic
#   2. canary  + canary_slug  → one tenant only, watch for ~24hr
#   3. production             → catch-all route, all tenants (default on push)
#   4. sync-only              → re-run KV backfill without touching the Worker
#   5. rollback-canary        → revert canary to previous Worker version
#   6. rollback-production    → revert production to previous Worker version
#
# Backfill (`sync:cdn-gate --apply`) runs automatically after canary,
# production, and sync-only targets so KV reflects current sub state.

name: Deploy cdn-gate Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/cdn-gate/**'
      - '.github/workflows/deploy-cdn-gate.yml'
      - 'scripts/sync-cdn-gate.ts'
      - 'src/lib/billing/cdn-gate.ts'
  workflow_dispatch:
    inputs:
      target:
        description: Deployment phase
        required: true
        type: choice
        options:
          - upload-only
          - canary
          - production
          - sync-only
          - rollback-canary
          - rollback-production
      canary_slug:
        description: 'Org slug to canary (only used when target=canary)'
        required: false
        default: canary-tenant
      reason:
        description: 'Reason / linked alert (audit trail in deploy message)'
        required: false

permissions:
  contents: read

concurrency:
  # Serialize deploys so two operators can't race each other into a
  # half-rolled-out state.
  group: cdn-gate-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: ${{ inputs.target || 'production' }}
    runs-on: ubuntu-latest
    # Configure this environment in GitHub repo settings with required
    # reviewers — that turns every dispatch into an approval gate, which
    # is the cheapest way to enforce two-person sign-off on changes that
    # touch every tenant.
    environment: cdn-gate-production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # On push to main: production. On workflow_dispatch: whatever the
      # operator picked. Refactored to a single source of truth so step
      # gates and the job name can share it.
      TARGET: ${{ inputs.target || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            workers/cdn-gate/package-lock.json

      - name: Install Worker deps
        working-directory: workers/cdn-gate
        run: npm ci

      - name: Type-check Worker
        working-directory: workers/cdn-gate
        run: npx tsc --noEmit

      # Discover or create the KV namespace so the operator never has to
      # run `wrangler kv namespace create` by hand. Idempotent: if a
      # namespace titled hotelops-gate already exists in the account,
      # we use its id; otherwise we create one and use the new id.
      # The id is printed to the job summary so it can be pasted into
      # Vercel as CLOUDFLARE_KV_GATE_NAMESPACE_ID (one-time, since the
      # app side also needs it to write KV from the webhook handler).
      - name: Discover or create KV namespace
        id: kv
        working-directory: workers/cdn-gate
        run: |
          set -euo pipefail
          NS_TITLE=hotelops-gate
          LIST_JSON=$(npx wrangler kv namespace list)
          KV_ID=$(echo "$LIST_JSON" | jq -r --arg t "$NS_TITLE" \
            '.[] | select(.title == $t) | .id' | head -n1)
          if [ -z "$KV_ID" ]; then
            echo "No '$NS_TITLE' KV namespace found; creating…"
            CREATE_OUT=$(npx wrangler kv namespace create "$NS_TITLE")
            echo "$CREATE_OUT"
            # wrangler prints `id = "abcdef…"` (TOML snippet).
            KV_ID=$(echo "$CREATE_OUT" | grep -oE '"[0-9a-f]{32}"' | head -n1 | tr -d '"')
          fi
          if [ -z "$KV_ID" ]; then
            echo "Failed to discover or create KV namespace '$NS_TITLE'." >&2
            exit 1
          fi
          echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"
          {
            echo "## KV namespace"
            echo ""
            echo "Using \`$NS_TITLE\` = \`$KV_ID\`"
            echo ""
            echo "If \`CLOUDFLARE_KV_GATE_NAMESPACE_ID\` isn't set in the app env (Vercel), paste the value above so the webhook handler can write KV from the app side."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Substitute placeholders into wrangler.toml
        working-directory: workers/cdn-gate
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          KV_ID: ${{ steps.kv.outputs.kv_id }}
          # `inputs.canary_slug` is empty on push triggers — fall back to the
          # workflow_dispatch default so the canary route stays syntactically
          # valid (it's only consumed when --env canary is deployed).
          CANARY_SLUG: ${{ inputs.canary_slug || 'canary-tenant' }}
        run: |
          set -euo pipefail
          : "${R2_BUCKET:?secret R2_BUCKET is not set}"
          : "${KV_ID:?KV namespace id was not resolved}"
          sed -i \
            -e "s|REPLACE_WITH_R2_BUCKET_NAME|${R2_BUCKET}|g" \
            -e "s|REPLACE_WITH_KV_NAMESPACE_ID|${KV_ID}|g" \
            -e "s|CANARY_SLUG|${CANARY_SLUG}|g" \
            wrangler.toml
          echo '── effective wrangler.toml ──' >&2
          cat wrangler.toml >&2

      # ─── upload-only: validate build + bindings, no traffic ────────────
      - name: Upload-only (dry run)
        if: env.TARGET == 'upload-only'
        working-directory: workers/cdn-gate
        run: |
          npx wrangler deploy --dry-run --outdir dist
          echo '✅ dry-run OK — no Worker pushed, no traffic affected'

      # ─── canary: deploy to single-tenant route ─────────────────────────
      - name: Deploy canary
        if: env.TARGET == 'canary'
        working-directory: workers/cdn-gate
        env:
          CANARY_SLUG: ${{ inputs.canary_slug }}
        run: |
          : "${CANARY_SLUG:?inputs.canary_slug is required for target=canary}"
          npx wrangler deploy \
            --env canary \
            --message "canary[$CANARY_SLUG] · ${{ github.actor }} · ${{ inputs.reason }}"

      # ─── production: catch-all route, all tenants ──────────────────────
      - name: Deploy production
        if: env.TARGET == 'production'
        working-directory: workers/cdn-gate
        run: |
          npx wrangler deploy \
            --env production \
            --message "production · ${{ github.actor }} · ${{ inputs.reason }}"

      # ─── rollback: revert to previous Worker version on the env ────────
      - name: Rollback canary
        if: env.TARGET == 'rollback-canary'
        working-directory: workers/cdn-gate
        run: |
          npx wrangler rollback --env canary \
            --message "rollback · ${{ github.actor }} · ${{ inputs.reason }}"

      - name: Rollback production
        if: env.TARGET == 'rollback-production'
        working-directory: workers/cdn-gate
        run: |
          npx wrangler rollback --env production \
            --message "rollback · ${{ github.actor }} · ${{ inputs.reason }}"

      # ─── backfill KV from DB ──────────────────────────────────────────
      # Runs after canary / production deploys so KV reflects current
      # sub state the moment the new route is live. Also the entire job
      # for sync-only target. Re-running is idempotent.
      - name: Install app deps (for backfill script)
        if: contains(fromJSON('["canary","production","sync-only"]'), env.TARGET)
        run: npm ci

      - name: Backfill KV from current subscription state
        if: contains(fromJSON('["canary","production","sync-only"]'), env.TARGET)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_KV_GATE_NAMESPACE_ID: ${{ steps.kv.outputs.kv_id }}
        run: npm run sync:cdn-gate -- --apply

      - name: Summary
        if: always()
        run: |
          {
            echo ""
            echo "## cdn-gate deploy: ${{ env.TARGET }}"
            echo ""
            echo "- actor: ${{ github.actor }}"
            echo "- canary_slug: \`${{ inputs.canary_slug }}\`"
            echo "- reason: ${{ inputs.reason }}"
            echo "- result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
